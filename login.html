<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APA Auto Login</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-image: url("https://wallpapers.com/images/hd/blurry-background-9qxi45i0cfo2e4vn.jpg");
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    label {
      flex: 0 0 30%;
      text-align: right;
      margin-right: 10px;
    }

    input[type="text"],
    input[type="password"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
      width: 100%;
    }

    button {
      background-color: #4CAF50; /* Green */
      border: none;
      color: white;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>APA Auto Login</h1>
    <form id="login-form">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit">Login</button>
    </form>
  </div>
  <script>
    const loginForm = document.getElementById("login-form");
    loginForm.addEventListener("submit", function(event) {
      event.preventDefault(); // Prevent default form submission

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (username === "hardloginapaauto" && password === "passloginapaauto") {
        const key = prompt("Enter Login Key (available at http://apaauto.info.gf/loginkey):");
        if (key === "HTFNMADFQ") {
          window.location.href = "apaauto.html"; // Redirect to apaauto.html
        } else {
          alert("Incorrect Login Key!");
        }
      } else {
        alert("Invalid Username or Password!");
      }
    });
  </script>
</body>
</html>
